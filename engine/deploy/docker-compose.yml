# SyntheticBrew Engine — Production Docker Compose
# Usage: cp .env.example .env && docker compose up -d

services:
  engine:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${ENGINE_PORT:-8443}:8443"
    environment:
      - DATABASE_URL=postgresql://syntheticbrew:${POSTGRES_PASSWORD:-syntheticbrew}@db:5432/syntheticbrew?sslmode=disable
      - SYNTHETICBREW_AUTH_MODE=${SYNTHETICBREW_AUTH_MODE:-local}
      - SYNTHETICBREW_JWT_KEYS_DIR=${SYNTHETICBREW_JWT_KEYS_DIR:-/var/lib/syntheticbrew/keys}
      - SYNTHETICBREW_JWT_PUBLIC_KEY_PATH=${SYNTHETICBREW_JWT_PUBLIC_KEY_PATH:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - BRIDGE_ENABLED=${BRIDGE_ENABLED:-false}
      - BRIDGE_URL=${BRIDGE_URL:-}
      - BRIDGE_AUTH_TOKEN=${BRIDGE_AUTH_TOKEN:-}
    volumes:
      - engine-data:/var/lib/syntheticbrew
      - engine-logs:/var/log/syntheticbrew
      - ./config.yaml:/etc/syntheticbrew/syntheticbrew.yaml:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8443/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  db-migrate:
    image: liquibase/liquibase:4.30
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../migrations:/liquibase/migrations
    command: >
      --url=jdbc:postgresql://db:5432/syntheticbrew
      --username=syntheticbrew
      --password=${POSTGRES_PASSWORD:-syntheticbrew}
      --changeLogFile=migrations/db.changelog-master.yaml
      update
    restart: "no"

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: syntheticbrew
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syntheticbrew}
      POSTGRES_DB: syntheticbrew
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syntheticbrew -d syntheticbrew"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: Local LLM via Ollama
  # Uncomment to use local models instead of cloud API
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   restart: unless-stopped

volumes:
  engine-data:
  engine-logs:
  pg-data:
  # ollama-data:
