# NOTE: Argo CD respects Helm pre/post-install hooks via Sync waves.
# Make sure your Argo CD version is v2.6+ (Helm hook → Argo wave mapping).
# If your Argo CD ignores hooks, the migrations Job and config-apply Job
# will not run. Workaround: add `argocd.argoproj.io/hook: PreSync` /
# `argocd.argoproj.io/hook: PostSync` annotations manually in templates.
#
# Argo CD Application examples for syntheticbrew-engine.
#
# These manifests assume a client-side GitOps repo with the following layout:
#
#   yourorg/syntheticbrew-deploy/
#   └── charts/
#       └── syntheticbrew/
#           ├── Chart.yaml          # references OCI chart or upstream repo
#           └── values-prod.yaml    # your environment-specific overrides
#
# Apply with: kubectl apply -f argocd-application.yaml -n argocd
#
# --- Option A: Git-based source (chart vendored or referenced in chart repo) ---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: syntheticbrew
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yourorg/syntheticbrew-deploy
    targetRevision: main
    path: charts/syntheticbrew
    helm:
      releaseName: syntheticbrew
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: syntheticbrew
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# --- Option B: OCI registry source (pull chart directly from GHCR) ---
# No client-side chart directory needed — Argo CD pulls from the OCI registry.
# values-prod.yaml lives in a separate git repo referenced via valuesObject
# or a separate source (Argo CD multi-source, available from v2.6).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: syntheticbrew-oci
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/syntheticinc/charts
    chart: syntheticbrew-engine
    targetRevision: 0.3.0
    helm:
      releaseName: syntheticbrew
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: syntheticbrew
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
