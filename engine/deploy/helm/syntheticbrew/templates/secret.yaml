{{- if not .Values.postgresql.external.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "syntheticbrew-engine.fullname" . }}-secrets
  labels:
    {{- include "syntheticbrew-engine.labels" . | nindent 4 }}
  annotations:
    # Created as a pre-install/pre-upgrade hook (mirrors the ServiceAccount) so it
    # exists before the migrations Job, which is itself a pre-install hook at
    # weight 5: Helm applies normal resources only after every hook completes, so a
    # normal-resource Secret would not exist when the migrations hook runs and a
    # fresh install using a chart-managed password (the documented Quick Install)
    # would hang the migrations pod on a missing Secret. The hook is unconditional
    # (not gated on migrations.enabled): a hook Secret is equally valid with
    # migrations off — it still precedes the engine Deployment — and an
    # enabled/disabled gate would flip the Secret's Helm ownership across upgrades,
    # which Helm resolves by deleting it. No hook-succeeded delete policy: the
    # engine Deployment references this Secret at runtime and must keep it.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
data:
  database-url: {{ include "syntheticbrew-engine.databaseURL" . | b64enc | quote }}
{{- end }}
