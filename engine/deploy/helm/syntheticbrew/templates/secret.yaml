{{- if not .Values.postgresql.external.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "syntheticbrew-engine.fullname" . }}-secrets
  labels:
    {{- include "syntheticbrew-engine.labels" . | nindent 4 }}
  {{- if .Values.migrations.enabled }}
  annotations:
    # The migrations Job runs as a pre-install/pre-upgrade hook, and Helm applies
    # normal resources only after every hook completes. Without these annotations
    # the chart-managed DB Secret would not exist yet when the migrations hook
    # starts, so a fresh install using a chart-managed password (the documented
    # Quick Install) hangs the migrations pod on a missing Secret. Make the Secret
    # a hook too, at a weight below the migrations Job (5), so it is created first.
    # No hook-succeeded delete policy: the engine Deployment (a normal resource)
    # references this Secret at runtime and must not have it deleted after the hook.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
  {{- end }}
type: Opaque
data:
  database-url: {{ include "syntheticbrew-engine.databaseURL" . | b64enc | quote }}
{{- end }}
