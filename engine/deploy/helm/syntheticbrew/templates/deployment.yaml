{{- if eq .Values.config.auth.mode "local" -}}
  {{- if gt (int .Values.replicaCount) 1 -}}
{{- fail "auth.mode=local supports only replicaCount=1 (single-writer JWT keypair on PVC). For HA use auth.mode=external with a pre-provisioned public key." -}}
  {{- end -}}
  {{- if and .Values.autoscaling.enabled (gt (int .Values.autoscaling.maxReplicas) 1) -}}
{{- fail "auth.mode=local with autoscaling.enabled and maxReplicas>1 is unsafe — HPA would scale past a single-writer JWT keypair PVC and cause auth races. Disable autoscaling, set maxReplicas=1, or use auth.mode=external for HA." -}}
  {{- end -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "syntheticbrew-engine.fullname" . }}
  labels:
    {{- include "syntheticbrew-engine.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  # Deployment strategy.
  # A mounted ReadWriteOnce PVC forces Recreate: the default RollingUpdate
  # creates the new pod BEFORE deleting the old one — the new pod then deadlocks
  # on Pending because the old pod still holds the RWO attachment, so
  # `helm upgrade --atomic` times out and rolls back. Only the JWT keypair PVC
  # can be on the critical path in local mode. When it is not mounted (keypair
  # from a Secret) the pod is stateless, so RollingUpdate is safe and gives
  # near-zero redeploy downtime. Override via .Values.deploymentStrategy when
  # needed (RWX storage).
  {{- $keysPVC := and (eq .Values.config.auth.mode "local") .Values.persistence.keys.enabled (not .Values.config.auth.existingKeysSecret) }}
  {{- if .Values.deploymentStrategy }}
  strategy:
    {{- toYaml .Values.deploymentStrategy | nindent 4 }}
  {{- else if not $keysPVC }}
  strategy:
    type: RollingUpdate
  {{- else if eq .Values.config.auth.mode "local" }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "syntheticbrew-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.postgresql.external.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if eq .Values.config.auth.mode "local" }}
        cluster-autoscaler.kubernetes.io/safe-to-evict: {{ .Values.clusterAutoscaler.safeToEvict | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "syntheticbrew-engine.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "syntheticbrew-engine.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8443
              protocol: TCP
          env:
            # Engine writes a runtime port-file to $HOME/.local/share/syntheticbrew/server.port.
            # With runAsUser=1000 and no allocated home dir, $HOME defaults to "/" which is
            # not writable for non-root. Pin HOME to a writable path inside the container.
            - name: HOME
              value: "/tmp"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "syntheticbrew-engine.databaseSecretName" . }}
                  key: {{ include "syntheticbrew-engine.databaseSecretKey" . }}
            - name: SYNTHETICBREW_AUTH_MODE
              value: {{ .Values.config.auth.mode | quote }}
            {{- if eq .Values.config.auth.mode "local" }}
            - name: SYNTHETICBREW_JWT_KEYS_DIR
              value: {{ .Values.config.auth.jwtKeysPath | quote }}
            {{- end }}
            {{- if eq .Values.config.auth.mode "external" }}
            - name: SYNTHETICBREW_JWT_PUBLIC_KEY_PATH
              value: {{ .Values.config.auth.jwtPublicKeyPath | quote }}
            {{- end }}
            {{- if .Values.config.oauth.issuer }}
            - name: SYNTHETICBREW_OAUTH_ISSUER
              value: {{ .Values.config.oauth.issuer | quote }}
            {{- if .Values.config.oauth.asKeySecret }}
            - name: SYNTHETICBREW_OAUTH_AS_KEY_PATH
              value: "/etc/syntheticbrew/oauth/{{ .Values.config.oauth.asKeySecretKey }}"
            {{- end }}
            {{- end }}
            {{- if .Values.config.embedURL }}
            - name: EMBED_URL
              value: {{ .Values.config.embedURL | quote }}
            - name: EMBED_MODEL
              value: {{ .Values.config.embedModel | quote }}
            - name: EMBED_DIM
              value: {{ .Values.config.embedDim | quote }}
            {{- end }}
            {{- with .Values.config.byok }}
            - name: SYNTHETICBREW_BYOK_ENABLED
              value: {{ .enabled | default false | quote }}
            {{- with .allowedProviders }}
            - name: SYNTHETICBREW_BYOK_ALLOWED_PROVIDERS
              value: {{ join "," . | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.bootstrapAdminToken.enabled }}
            - name: SYNTHETICBREW_BOOTSTRAP_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ required "bootstrapAdminToken.existingSecret is required when bootstrapAdminToken.enabled=true" .Values.bootstrapAdminToken.existingSecret }}
                  key: {{ .Values.bootstrapAdminToken.existingSecretKey | default "token" }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.config.agents }}
            - name: config
              mountPath: /etc/syntheticbrew/agents.yaml
              subPath: agents.yaml
              readOnly: true
            {{- end }}
            {{- if and (eq .Values.config.auth.mode "local") (or .Values.config.auth.existingKeysSecret .Values.persistence.keys.enabled) }}
            - name: keys
              mountPath: {{ .Values.config.auth.jwtKeysPath | quote }}
              {{- if .Values.config.auth.existingKeysSecret }}
              readOnly: true
              {{- end }}
            {{- end }}
            {{- if .Values.config.oauth.asKeySecret }}
            - name: oauth-as-key
              mountPath: /etc/syntheticbrew/oauth
              readOnly: true
            {{- end }}
            {{- if .Values.containerSecurityContext.readOnlyRootFilesystem }}
            # Auto-mounted when readOnlyRootFilesystem is enabled. Engine writes
            # server.port discovery file (HOME=/tmp), Liquibase + GORM stage temp.
            - name: tmp
              mountPath: /tmp
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.config.agents }}
        - name: config
          configMap:
            name: {{ include "syntheticbrew-engine.fullname" . }}-config
        {{- end }}
        {{- if and (eq .Values.config.auth.mode "local") .Values.config.auth.existingKeysSecret }}
        # Keypair mounted READ-ONLY from a Secret — no RWO keys PVC, so the pod
        # reschedules to any node instantly (no block-volume attach/detach).
        - name: keys
          secret:
            secretName: {{ .Values.config.auth.existingKeysSecret | quote }}
            defaultMode: 0400
        {{- else if and (eq .Values.config.auth.mode "local") .Values.persistence.keys.enabled }}
        - name: keys
          persistentVolumeClaim:
            claimName: {{ include "syntheticbrew-engine.fullname" . }}-keys
        {{- end }}
        {{- if .Values.config.oauth.asKeySecret }}
        - name: oauth-as-key
          secret:
            secretName: {{ .Values.config.oauth.asKeySecret | quote }}
            defaultMode: 0400
        {{- end }}
        {{- if .Values.containerSecurityContext.readOnlyRootFilesystem }}
        - name: tmp
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
