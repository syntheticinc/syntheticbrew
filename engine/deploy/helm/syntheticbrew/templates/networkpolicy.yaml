{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "syntheticbrew-engine.fullname" . }}
  labels:
    {{- include "syntheticbrew-engine.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "syntheticbrew-engine.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    - {}
{{- end }}
