{{- if .Values.migrations.enabled }}
{{- $tag := .Values.migrations.image.tag | default .Values.image.tag -}}
{{- if eq $tag "latest" -}}
{{- fail "migrations.image.tag (or image.tag) must be set to a specific version (e.g. v1.0.0), not 'latest', for reproducible migrations. Set image.tag in values.yaml." -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "syntheticbrew-engine.fullname" . }}-migrations
  labels:
    {{- include "syntheticbrew-engine.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "syntheticbrew-engine.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "syntheticbrew-engine.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.migrations.waitForDB.enabled }}
      initContainers:
        - name: wait-for-db
          image: "{{ .Values.migrations.image.repository }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Block until Postgres accepts TCP connections so the migration Job
          # (backoffLimit: 0) doesn't fail the release on a cold database. Host
          # and port are parsed from the same libpq DATABASE_URL the migration
          # container uses; the wait uses bash's /dev/tcp so no extra client
          # tooling or image is required.
          command: ["/bin/bash", "-eu", "-c"]
          args:
            - |
              URL_NO_PROTO="${DATABASE_URL#postgres://}"
              URL_NO_PROTO="${URL_NO_PROTO#postgresql://}"
              HOSTPATH="${URL_NO_PROTO##*@}"          # strip user:pass@
              case "$HOSTPATH" in
                *\?*) HOSTPATH="${HOSTPATH%%\?*}" ;;    # drop ?query
              esac
              HOSTPORT="${HOSTPATH%%/*}"               # drop /dbname
              DB_HOST="${HOSTPORT%%:*}"
              case "$HOSTPORT" in
                *:*) DB_PORT="${HOSTPORT##*:}" ;;
                *)   DB_PORT="5432" ;;
              esac
              echo "waiting for postgres at ${DB_HOST}:${DB_PORT}..."
              for _ in $(seq 1 {{ .Values.migrations.waitForDB.retries }}); do
                if (exec 3<>"/dev/tcp/${DB_HOST}/${DB_PORT}") 2>/dev/null; then
                  echo "postgres is accepting connections"
                  exit 0
                fi
                sleep {{ .Values.migrations.waitForDB.intervalSeconds }}
              done
              echo "timed out waiting for postgres at ${DB_HOST}:${DB_PORT}" >&2
              exit 1
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "syntheticbrew-engine.databaseSecretName" . }}
                  key: {{ include "syntheticbrew-engine.databaseSecretKey" . }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: migrations
          image: "{{ .Values.migrations.image.repository }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Image is stock liquibase/liquibase (entrypoint /liquibase/docker-entrypoint.sh,
          # default Cmd is --help). Convert libpq DATABASE_URL → JDBC parts and invoke
          # `liquibase update` against the bundled changelog.
          #
          # Credentials are passed via LIQUIBASE_COMMAND_USERNAME/PASSWORD env so they
          # never appear in process argv (no leak via `ps` / kubectl logs / k8s events).
          # User and password are URL-decoded — real DSNs commonly contain %40 (@),
          # %2F (/), %3A (:) etc. JDBC PostgreSQL does NOT URL-decode credentials, so
          # we must decode here before handing off.
          #
          # /bin/bash required: printf '%b' \xHH escapes are bash-only (POSIX dash
          # doesn't support hex byte escapes). Liquibase image is Ubuntu 22.04 →
          # bash is present at /bin/bash.
          command: ["/bin/bash", "-eu", "-c"]
          args:
            - |
              # URL-decode: + → space, %XX → byte. Requires bash's printf '%b'.
              urldecode() {
                printf '%b' "$(printf '%s' "$1" | sed 's/+/ /g; s/%\([0-9a-fA-F][0-9a-fA-F]\)/\\x\1/g')"
              }

              URL_NO_PROTO="${DATABASE_URL#postgres://}"
              URL_NO_PROTO="${URL_NO_PROTO#postgresql://}"

              USERPASS_RAW="${URL_NO_PROTO%@*}"        # greedy strip: handles @ in pwd
              HOSTPATH="${URL_NO_PROTO##*@}"
              DB_USER_RAW="${USERPASS_RAW%%:*}"
              DB_PASS_RAW="${USERPASS_RAW#*:}"

              QUERY=""
              case "$HOSTPATH" in
                *\?*) QUERY="?${HOSTPATH#*\?}"; HOSTPATH_NO_Q="${HOSTPATH%%\?*}" ;;
                *)    HOSTPATH_NO_Q="$HOSTPATH" ;;
              esac
              HOSTPORT="${HOSTPATH_NO_Q%%/*}"
              DB_NAME="${HOSTPATH_NO_Q#*/}"

              JDBC_URL="jdbc:postgresql://${HOSTPORT}/${DB_NAME}${QUERY}"

              # Export creds via env so they stay off argv. exec replaces shell so
              # the env stays scoped to liquibase process only.
              export LIQUIBASE_COMMAND_USERNAME="$(urldecode "$DB_USER_RAW")"
              export LIQUIBASE_COMMAND_PASSWORD="$(urldecode "$DB_PASS_RAW")"

              exec /liquibase/docker-entrypoint.sh \
                --url="$JDBC_URL" \
                --changeLogFile=migrations/db.changelog-master.yaml \
                update
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "syntheticbrew-engine.databaseSecretName" . }}
                  key: {{ include "syntheticbrew-engine.databaseSecretKey" . }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          {{- if or .Values.containerSecurityContext.readOnlyRootFilesystem .Values.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.containerSecurityContext.readOnlyRootFilesystem }}
            # Liquibase writes temp parser cache + lock files to /tmp.
            - name: tmp
              mountPath: /tmp
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or .Values.containerSecurityContext.readOnlyRootFilesystem .Values.extraVolumes }}
      volumes:
        {{- if .Values.containerSecurityContext.readOnlyRootFilesystem }}
        - name: tmp
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
