{{- if and .Values.configApply.enabled (not .Values.configApply.existingConfigMap) .Values.configApply.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "syntheticbrew-engine.fullname" . }}-syntheticbrew-config
  labels:
    {{- include "syntheticbrew-engine.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  syntheticbrew.yaml: |
{{ .Values.configApply.config | indent 4 }}
{{- end }}
