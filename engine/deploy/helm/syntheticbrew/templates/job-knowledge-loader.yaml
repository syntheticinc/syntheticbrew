{{- if .Values.knowledgeLoader.enabled }}
{{- if not .Values.knowledgeLoader.kb }}
{{- fail "knowledgeLoader.enabled=true requires knowledgeLoader.kb (KB name; must exist in configApply bundle as knowledge_bases[].name)" -}}
{{- end }}
{{- if not .Values.knowledgeLoader.existingConfigMap }}
{{- fail "knowledgeLoader.enabled=true requires knowledgeLoader.existingConfigMap (ConfigMap with knowledge files as data keys; create with `kubectl create configmap NAME --from-file=./dir/`, or render via helmfile/Kustomize)" -}}
{{- end }}
{{- $tokenSecret := .Values.knowledgeLoader.tokenSecret | default .Values.configApply.tokenSecret -}}
{{- if not $tokenSecret }}
{{- fail "knowledgeLoader.enabled=true requires either knowledgeLoader.tokenSecret or configApply.tokenSecret (Secret with admin Bearer token under key 'token')" -}}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "syntheticbrew-engine.fullname" . }}-knowledge-loader
  labels:
    {{- include "syntheticbrew-engine.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "15"
    # before-hook-creation,hook-succeeded — failed Jobs persist (so the
    # operator can `kubectl logs job/...-knowledge-loader` after a red
    # `helm upgrade`), succeeded Jobs are reaped to keep the namespace
    # tidy. Plain "before-hook-creation" would only reap on the *next*
    # upgrade — between the failure and the retry, the operator has
    # one shot to capture logs before they're gone.
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  activeDeadlineSeconds: {{ .Values.knowledgeLoader.activeDeadlineSeconds }}
  # Single-shot Job: no in-place restart, no extra pod attempts. Failed pod
  # stays in Failed state so its logs remain inspectable via
  # `kubectl logs job/...` (Job controller's backoffLimit-exceeded path
  # otherwise deletes the pod, masking the actual error).
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "syntheticbrew-engine.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: knowledge-loader
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "syntheticbrew-engine.serviceAccountName" . }}
      # IMPORTANT: knowledgeLoader Job overrides chart's restrictive
      # podSecurityContext (runAsNonRoot=true, runAsUser=1000). The default
      # alpine image installs curl+jq via `apk add` at startup, which
      # requires root. Job is short-lived (seconds), only talks to engine
      # REST API, no persistent state — accepted trade-off vs maintaining
      # a dedicated syntheticbrew/kb-loader image. To re-enable non-root,
      # override knowledgeLoader.image to a pre-built variant with curl+jq
      # pre-installed (e.g. your-registry/kb-loader:tag).
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      initContainers:
        # Wait for engine to be ready (matches configApply Job pattern).
        # configApply has weight=10, knowledgeLoader weight=15 — but Helm runs
        # post-install hooks in parallel by default, so we still need to wait.
        - name: wait-for-engine
          image: {{ .Values.knowledgeLoader.image.repository }}:{{ .Values.knowledgeLoader.image.tag }}
          imagePullPolicy: {{ .Values.knowledgeLoader.image.pullPolicy }}
          # Override chart's restrictive containerSecurityContext for this
          # init container — alpine apk install requires writable /var/cache
          # AND root; the chart sets allowPrivilegeEscalation: false +
          # readOnlyRootFilesystem (when configured) which would block apk.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          env:
            - name: ENGINE_URL
              value: "http://{{ include "syntheticbrew-engine.fullname" . }}:{{ .Values.service.port }}"
          command:
            - sh
            - -ec
            - |
              apk add --no-cache curl
              for i in $(seq 1 150); do
                if curl -sf "$ENGINE_URL/api/v1/health" > /dev/null; then
                  echo "Engine ready after $i attempts"
                  exit 0
                fi
                echo "Waiting for engine... ($i/150)"
                sleep 2
              done
              echo "Engine did not become ready after 5 minutes" >&2
              exit 1
      containers:
        - name: knowledge-loader
          image: {{ .Values.knowledgeLoader.image.repository }}:{{ .Values.knowledgeLoader.image.tag }}
          imagePullPolicy: {{ .Values.knowledgeLoader.image.pullPolicy }}
          # Same security relaxation as init container — apk install requires
          # writable /var and root. See pod-level securityContext comment above.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          env:
            - name: ENGINE_URL
              value: "http://{{ include "syntheticbrew-engine.fullname" . }}:{{ .Values.service.port }}"
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $tokenSecret }}
                  key: {{ .Values.knowledgeLoader.tokenSecretKey | default "token" }}
            - name: KB_NAME
              value: {{ .Values.knowledgeLoader.kb | quote }}
            - name: EMBEDDING_MODEL_NAME
              value: {{ .Values.knowledgeLoader.embeddingModel | default "" | quote }}
            - name: MODE
              value: {{ .Values.knowledgeLoader.mode | quote }}
            - name: PRUNE
              value: {{ .Values.knowledgeLoader.prune | quote }}
            - name: KNOWLEDGE_DIR
              value: /etc/syntheticbrew/knowledge-files
          command:
            - sh
            - -eu
            - -c
            - |
              # alpine base — install minimal tooling. apk is fast (~3s).
              # No `|| true` — fail fast if install fails so the operator
              # sees the actual error in Job logs.
              apk add --no-cache curl jq

              auth() { printf 'Authorization: Bearer %s' "$TOKEN"; }

              echo "==> Resolve KB id by name '$KB_NAME'"
              KB_JSON=$(curl -fsS -H "$(auth)" "$ENGINE_URL/api/v1/knowledge-bases" \
                | jq -c --arg n "$KB_NAME" '.[] | select(.name==$n)' | head -1)
              KB_ID=$(echo "$KB_JSON" | jq -r '.id // empty')
              if [ -z "$KB_ID" ]; then
                echo "FAIL: knowledge base '$KB_NAME' not found" >&2
                echo "Hint: declare it in configApply.config under knowledge_bases:" >&2
                exit 1
              fi
              echo "OK: KB '$KB_NAME' = $KB_ID"

              # brewctl 0.1.0 has a known limitation: when models AND
              # knowledge_bases are declared in the same bundle, brewctl
              # resolves embedding_model by name against PRE-apply state.
              # The embedding model exists only in the desired set at that
              # point, so the KB ends up with embedding_model_id="" and
              # POST /files returns 400 "no embedding model configured".
              # Workaround: probe and PATCH here. Self-heals once brewctl
              # 0.1.1+ ships a two-pass apply.
              EMB_ID=$(echo "$KB_JSON" | jq -r '.embedding_model_id // empty')
              if [ -z "$EMB_ID" ] && [ -n "$EMBEDDING_MODEL_NAME" ]; then
                echo "==> KB '$KB_NAME' has no embedding_model_id — link to '$EMBEDDING_MODEL_NAME'"
                EMB_ID=$(curl -fsS -H "$(auth)" "$ENGINE_URL/api/v1/models" \
                  | jq -r --arg n "$EMBEDDING_MODEL_NAME" '.[] | select(.name==$n) | .id' | head -1)
                if [ -z "$EMB_ID" ]; then
                  echo "FAIL: embedding model '$EMBEDDING_MODEL_NAME' not found in /api/v1/models" >&2
                  echo "Hint: declare it under configApply.config models: with model_kind: embedding" >&2
                  exit 1
                fi
                echo "  PATCH KB embedding_model_id=$EMB_ID"
                curl -fsS -X PATCH -H "$(auth)" -H "Content-Type: application/json" \
                  -d "{\"embedding_model_id\":\"$EMB_ID\"}" \
                  "$ENGINE_URL/api/v1/knowledge-bases/$KB_NAME" >/dev/null
                EMB_ID_NEW=$(curl -fsS -H "$(auth)" "$ENGINE_URL/api/v1/knowledge-bases/$KB_NAME" | jq -r '.embedding_model_id // empty')
                if [ -z "$EMB_ID_NEW" ]; then
                  echo "FAIL: PATCH did not persist embedding_model_id" >&2
                  exit 1
                fi
                echo "  OK: KB now linked to embedding model"
              elif [ -z "$EMB_ID" ]; then
                # Fail fast — file uploads will 400 anyway, this surfaces the
                # cause clearly instead of "no embedding model configured".
                echo "FAIL: KB '$KB_NAME' has no embedding_model_id and knowledgeLoader.embeddingModel is unset" >&2
                echo "Set knowledgeLoader.embeddingModel to the name of an embedding model declared in configApply.config" >&2
                exit 1
              fi

              echo "==> List remote files (file_name + file_size)"
              # Engine prepends an UUID prefix to uploaded filenames on disk
              # ("<uuid>_<original>"). For idempotent name comparison we must
              # strip the prefix so that local "faq.md" matches remote
              # "<uuid>_faq.md". Without this the loader re-uploads on every
              # sync and the KB grows linearly across runs.
              REMOTE=$(curl -fsS -H "$(auth)" \
                "$ENGINE_URL/api/v1/knowledge-bases/$KB_NAME/files" \
                | jq -c '[.[] | {name: (.file_name | sub("^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}_"; "")), size: .file_size, id: .id}]')
              echo "$REMOTE" | jq -r '.[] | "  remote: \(.name) (\(.size) bytes)"'

              echo "==> Walk local files"
              [ -d "$KNOWLEDGE_DIR" ] || { echo "FAIL: $KNOWLEDGE_DIR missing" >&2; exit 1; }
              UPLOADED=0
              SKIPPED=0
              REPLACED=0
              # Build a list of local file basenames for prune comparison.
              LOCAL_NAMES=""

              for f in "$KNOWLEDGE_DIR"/*; do
                [ -f "$f" ] || continue
                NAME=$(basename "$f")
                SIZE=$(wc -c < "$f" | tr -d ' ')
                LOCAL_NAMES="$LOCAL_NAMES $NAME"

                # Find existing file with same name.
                EXISTING=$(echo "$REMOTE" | jq -c --arg n "$NAME" '.[] | select(.name==$n)')
                EXISTING_ID=$(echo "$EXISTING" | jq -r '.id // empty')
                EXISTING_SIZE=$(echo "$EXISTING" | jq -r '.size // empty')

                case "$MODE" in
                  always)
                    if [ -n "$EXISTING_ID" ]; then
                      echo "  delete $NAME ($EXISTING_ID) — mode=always"
                      curl -fsS -X DELETE -H "$(auth)" \
                        "$ENGINE_URL/api/v1/knowledge-bases/$KB_NAME/files/$EXISTING_ID" >/dev/null
                      REPLACED=$((REPLACED + 1))
                    fi
                    UP=upload
                    ;;
                  replace)
                    if [ -z "$EXISTING_ID" ]; then
                      UP=upload
                    elif [ "$EXISTING_SIZE" = "$SIZE" ]; then
                      UP=skip
                    else
                      echo "  delete $NAME ($EXISTING_ID) — size differs ($EXISTING_SIZE → $SIZE)"
                      curl -fsS -X DELETE -H "$(auth)" \
                        "$ENGINE_URL/api/v1/knowledge-bases/$KB_NAME/files/$EXISTING_ID" >/dev/null
                      UP=upload
                      REPLACED=$((REPLACED + 1))
                    fi
                    ;;
                  skip-existing|*)
                    if [ -n "$EXISTING_ID" ]; then
                      UP=skip
                    else
                      UP=upload
                    fi
                    ;;
                esac

                if [ "$UP" = "upload" ]; then
                  echo "  upload $NAME ($SIZE bytes)"
                  HTTP_OUT=/tmp/upload-resp.txt
                  HTTP_CODE=$(curl -sS -o "$HTTP_OUT" -w '%{http_code}' \
                    -X POST -H "$(auth)" \
                    -F "file=@$f" \
                    "$ENGINE_URL/api/v1/knowledge-bases/$KB_NAME/files" || echo "curl_error")
                  if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
                    echo "FAIL: upload $NAME → HTTP $HTTP_CODE" >&2
                    echo "Response body:" >&2
                    cat "$HTTP_OUT" >&2
                    exit 1
                  fi
                  UPLOADED=$((UPLOADED + 1))
                else
                  echo "  skip   $NAME (exists, size match)"
                  SKIPPED=$((SKIPPED + 1))
                fi
              done

              PRUNED=0
              if [ "$PRUNE" = "true" ]; then
                echo "==> Prune: delete remote files not in ConfigMap"
                # Read prune list from a tempfile rather than `| while` —
                # busybox sh runs `while` in a subshell when piped, so
                # PRUNED would never escape, and `set -e` doesn't trip on
                # a curl failure inside the pipeline (exit status of the
                # pipeline is the right side, which always succeeds).
                PRUNE_LIST=/tmp/prune-list.txt
                echo "$REMOTE" | jq -r '.[] | "\(.name)\t\(.id)"' > "$PRUNE_LIST"
                while IFS="$(printf '\t')" read -r RNAME RID; do
                  case " $LOCAL_NAMES " in
                    *" $RNAME "*) ;;
                    *)
                      echo "  prune  $RNAME ($RID)"
                      curl -fsS -X DELETE -H "$(auth)" \
                        "$ENGINE_URL/api/v1/knowledge-bases/$KB_NAME/files/$RID" >/dev/null
                      PRUNED=$((PRUNED + 1))
                      ;;
                  esac
                done < "$PRUNE_LIST"
              fi

              echo "==> Done: uploaded=$UPLOADED skipped=$SKIPPED replaced=$REPLACED pruned=$PRUNED"
          resources:
            {{- toYaml .Values.knowledgeLoader.resources | nindent 12 }}
          volumeMounts:
            - name: knowledge-files
              mountPath: /etc/syntheticbrew/knowledge-files
              readOnly: true
            {{- if .Values.containerSecurityContext.readOnlyRootFilesystem }}
            - name: tmp
              mountPath: /tmp
            {{- end }}
      volumes:
        - name: knowledge-files
          configMap:
            name: {{ .Values.knowledgeLoader.existingConfigMap }}
        {{- if .Values.containerSecurityContext.readOnlyRootFilesystem }}
        - name: tmp
          emptyDir: {}
        {{- end }}
{{- end }}
