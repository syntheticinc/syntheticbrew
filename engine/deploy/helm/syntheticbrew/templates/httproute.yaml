{{- if .Values.httpRoute.enabled }}
{{- range .Values.httpRoute.routes }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "syntheticbrew-engine.fullname" $ }}-{{ .nameSuffix }}
  labels:
    {{- include "syntheticbrew-engine.labels" $ | nindent 4 }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .parentRefs }}
    - name: {{ .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
      {{- with .port }}
      port: {{ . }}
      {{- end }}
    {{- end }}
  hostnames:
    {{- range .hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    {{- range .rules }}
    - matches:
        {{- range .matches }}
        - path:
            type: {{ .pathType | default "PathPrefix" }}
            value: {{ .path | default "/" }}
        {{- end }}
      backendRefs:
        - name: {{ include "syntheticbrew-engine.fullname" $ }}
          port: {{ .servicePort }}
    {{- end }}
---
{{- end }}
{{- end }}
