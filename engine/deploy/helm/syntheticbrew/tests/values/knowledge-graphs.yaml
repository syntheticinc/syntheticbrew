# Test scenario: declarative Knowledge Graph deployment via Helm + configApply.
#
# - configApply pushes a small Knowledge Graph bundle (industry entity_type +
#   3 entities) through the existing /api/v1/config/import endpoint extended
#   with `knowledge_graphs:` top-level section in engine 1.3.0.
# - Agent is bound to the bundle via the `knowledge_graphs` capability so the
#   engine auto-generates `list_industry`, `get_industry` MCP tools and
#   injects them into the agent's runtime tool list.
#
# Smoke (smoke.sh) asserts:
#   GET /api/v1/knowledge-graphs                       → 200, contains "kind-smoke-kg"
#   GET /api/v1/knowledge-graphs/kind-smoke-kg          → manifest with entity_types
#   GET /api/v1/knowledge-graphs/kind-smoke-kg/entities/industry → 3 entities
#   GET /api/v1/agents/kind-smoke-kg-agent              → derived_tools includes
#                                                          "list_industry", "get_industry"
replicaCount: 1

image:
  repository: syntheticinc/syntheticbrew
  # Engine 1.3.0 — first version with Knowledge Graphs support.
  tag: "1.3.0"
  pullPolicy: IfNotPresent

postgresql:
  external:
    existingSecret: postgres-credentials
    existingSecretKey: DATABASE_URL

config:
  auth:
    mode: local
    jwtKeysPath: /var/lib/syntheticbrew/keys

persistence:
  keys:
    enabled: true
    size: 1Mi
    storageClass: standard

ingress: { enabled: false }
httpRoute: { enabled: false }

migrations:
  enabled: true
  image:
    repository: syntheticinc/syntheticbrew-migrations
    tag: "1.3.0"

bootstrapAdminToken:
  enabled: true
  existingSecret: postgres-credentials
  existingSecretKey: token

configApply:
  enabled: true
  # brewctl 0.3.0 — first version with `kg apply / diff / pull` subcommands
  # AND extended /config/import payload understanding `knowledge_graphs:` key.
  image:
    tag: "0.3.0"
  tokenSecret: postgres-credentials
  config: |
    knowledge_graphs:
      - bundle_name: kind-smoke-kg
        version: 1.0.0
        schemas:
          - entity_type: industry
            schema: |
              {
                "$schema": "https://json-schema.org/draft/2020-12/schema",
                "$id": "industry",
                "type": "object",
                "x-id-field": "code",
                "x-tool-expose": ["list", "get"],
                "required": ["code", "name"],
                "additionalProperties": false,
                "properties": {
                  "code": {"type": "string", "pattern": "^[A-Z]{2,4}$", "x-index": true},
                  "name": {"type": "string", "minLength": 3},
                  "popularity": {"type": "string", "enum": ["high", "medium", "low"], "x-index": true}
                }
              }
        entities:
          - entity_type: industry
            items:
              - {code: PM, name: "Property Management", popularity: high}
              - {code: AG, name: "Agriculture", popularity: medium}
              - {code: WH, name: "Warehousing", popularity: high}
    agents:
      - name: kind-smoke-kg-agent
        lifecycle: persistent
        system_prompt: "Smoke test agent for Knowledge Graphs. Use list_industry to enumerate."
        capabilities:
          - type: knowledge_graphs
            enabled: true
            config:
              bundles: [kind-smoke-kg]
    schemas:
      - name: kind-smoke-kg-schema
        entry_agent: kind-smoke-kg-agent
        chat_enabled: true

resources:
  requests: { cpu: 50m, memory: 128Mi }
  limits:   { cpu: 500m, memory: 512Mi }
