# Test scenario: node-churn stability — no ReadWriteOnce PVC on the pod's
# startup critical path. The JWT keypair is mounted READ-ONLY from a Secret
# (config.auth.existingKeysSecret) and knowledge raw-file storage is "none"
# (PostgreSQL-only), so neither the keys PVC nor the knowledge PVC is created.
# The single pod can reschedule to any node in seconds (no CSI attach/detach).
# Single-replica resilience — NOT HA (replicaCount stays 1).
replicaCount: 1

image:
  repository: syntheticinc/syntheticbrew
  tag: "1.9.0"
  pullPolicy: IfNotPresent

postgresql:
  external:
    existingSecret: postgres-credentials
    existingSecretKey: DATABASE_URL

config:
  auth:
    mode: local
    jwtKeysPath: /var/lib/syntheticbrew/keys
    # Keypair mounted read-only from this Secret → no keys PVC.
    existingKeysSecret: jwt-keys-secret
  knowledge:
    # Stateless knowledge — live data in PostgreSQL only, no raw-files PVC.
    storage: none

persistence:
  keys:
    # No keys PVC — the keypair comes from existingKeysSecret above.
    enabled: false

ingress:
  enabled: false

httpRoute:
  enabled: false

migrations:
  enabled: true
  image:
    repository: syntheticinc/syntheticbrew-migrations
    tag: "1.9.0"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
