# Test scenario: node-churn stability — no ReadWriteOnce PVC on the pod's
# startup critical path. The engine is always stateless for knowledge (live
# data in PostgreSQL only), so the only RWO PVC that can exist is the JWT
# keypair PVC — and that is avoided here by mounting the keypair READ-ONLY from
# a Secret (config.auth.existingKeysSecret + persistence.keys.enabled=false).
# The single pod can reschedule to any node in seconds (no CSI attach/detach).
# Single-replica resilience — NOT HA (replicaCount stays 1).
replicaCount: 1

image:
  repository: syntheticinc/syntheticbrew
  tag: "1.12.0"
  pullPolicy: IfNotPresent

postgresql:
  external:
    existingSecret: postgres-credentials
    existingSecretKey: DATABASE_URL

config:
  auth:
    mode: local
    jwtKeysPath: /var/lib/syntheticbrew/keys
    # Keypair mounted read-only from this Secret → no keys PVC.
    existingKeysSecret: jwt-keys-secret

persistence:
  keys:
    # No keys PVC — the keypair comes from existingKeysSecret above.
    enabled: false

ingress:
  enabled: false

httpRoute:
  enabled: false

migrations:
  enabled: true
  image:
    repository: syntheticinc/syntheticbrew-migrations
    tag: "1.12.0"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
