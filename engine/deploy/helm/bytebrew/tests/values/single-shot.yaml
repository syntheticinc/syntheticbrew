# Test scenario: GitOps-style single-shot deploy.
# bootstrapAdminToken seeds admin token at engine boot.
# configApply Job runs as post-install hook with same token + applies smoke YAML.
# Validates the full helmfile-equivalent flow.
replicaCount: 1

image:
  repository: bytebrew/engine
  tag: "1.1.11"
  pullPolicy: IfNotPresent

postgresql:
  external:
    existingSecret: postgres-credentials
    existingSecretKey: DATABASE_URL

config:
  auth:
    mode: local
    jwtKeysPath: /var/lib/bytebrew/keys

persistence:
  keys:
    enabled: true
    size: 1Mi
    storageClass: standard

ingress:
  enabled: false

httpRoute:
  enabled: false

migrations:
  enabled: true
  image:
    repository: bytebrew/engine-migrations
    tag: "1.1.11"

bootstrapAdminToken:
  enabled: true
  existingSecret: postgres-credentials
  existingSecretKey: token

# brewctl applies a real smoke bundle right after engine becomes healthy.
# Validates that brewctl actually creates resources (was caught as a v0.4.2
# false-positive: empty `models: []` would let brewctl say "No changes" even
# if the chart-side ConfigMap mount path was broken — see 0.4.3 release notes).
# apiKeysSecret needed because models[].api_key references ${OPENROUTER_API_KEY}.
configApply:
  enabled: true
  # Pin to the last published brewctl compatible with engine 1.1.1 fixture
  # above. Chart 0.6.3 default is 0.2.3 (paired with engine 1.1.3 for the
  # CreateSchema entry_agent_id name resolution), but the published 1.1.3
  # binaries only land after this PR merges. Follow-up PR bumps both fixtures
  # together (engine 1.1.3 + brewctl 0.2.3) and re-enables the smoke.sh
  # entry_agent_name assertion that was deferred along with this pin.
  image:
    tag: "0.2.5"
  tokenSecret: postgres-credentials
  apiKeysSecret: postgres-credentials
  config: |
    models:
      - name: kind-smoke-model
        # Use canonical type form for stability across engine versions. Engine
        # v1.0.3+ also normalizes the `openrouter` alias on PATCH (matches POST),
        # so reconcile is idempotent in either case. Earlier engines (1.0.2)
        # would reject alias on PATCH due to chk_models_type — keep canonical to
        # stay forward-and-back compatible.
        type: openai_compatible
        model_kind: chat        # brewctl bundle field; collides with top-level `kind` if named `kind`
        base_url: https://openrouter.ai/api/v1
        model_name: openai/gpt-4o-mini
        api_key: ${OPENROUTER_API_KEY}
        is_default: true
    agents:
      - name: kind-smoke-agent
        model: kind-smoke-model
        lifecycle: persistent
        system_prompt: "Kind smoke test agent — chart-flow validation only."
    schemas:
      - name: kind-smoke-schema
        entry_agent: kind-smoke-agent
        chat_enabled: true

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
