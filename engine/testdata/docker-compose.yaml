services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: syntheticbrew_test
      POSTGRES_USER: syntheticbrew
      POSTGRES_PASSWORD: syntheticbrew
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syntheticbrew -d syntheticbrew_test"]
      interval: 2s
      timeout: 2s
      retries: 10
