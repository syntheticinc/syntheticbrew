bundle_name: iot-taxonomy-example
version: 1.0.0
description: |
  Generic IoT industry/sensor/use-case taxonomy. Public example bundle for
  SyntheticBrew Knowledge Graphs. Apply with: brewctl kg apply ./iot-taxonomy
entity_types:
  - name: industry
    schema_file: schemas/industry.schema.json
    entities_file: entities/industries.yaml
  - name: sensor_family
    schema_file: schemas/sensor_family.schema.json
    entities_file: entities/sensor_families.yaml
  - name: use_case
    schema_file: schemas/use_case.schema.json
    entities_file: entities/use_cases.yaml
