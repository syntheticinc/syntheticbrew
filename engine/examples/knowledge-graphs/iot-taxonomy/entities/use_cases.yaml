- id: PM-LEAK-001
  name: Water leak detection in apartment buildings
  industry: PM
  sensor_family: leak_sensor
  status: approved
  description: |
    Detect water leaks early in basements, common bathrooms, and laundry
    rooms. Notify the property manager within 60 seconds; integrate with
    valve shutoff where available. Targets reduction of insurance claims.

- id: PM-OCC-002
  name: Common-area occupancy monitoring
  industry: PM
  sensor_family: pir_motion
  status: approved
  description: |
    Monitor occupancy of gyms, lounges, and shared workspaces to schedule
    cleaning and HVAC. Reports utilisation by hour-of-day and day-of-week.

- id: PM-DOOR-003
  name: Exterior door open-too-long alerts
  industry: PM
  sensor_family: door_contact
  status: approved
  description: |
    Detect when exterior doors remain open beyond a threshold. Useful for
    energy waste and security alerting in multi-family buildings.

