syntax = "proto3";

package bytebrew.v1;

option go_package = "github.com/syntheticinc/syntheticbrew/api/proto/gen;bytebrewv1";

// Common message types used across services

// CodeChunk represents a chunk of code with metadata
message CodeChunk {
  string chunk_id = 1;
  string project_key = 2;
  string user_id = 3;
  string file_path = 4;
  string content = 5;
  int32 start_line = 6;
  int32 end_line = 7;
  string language = 8;
  string chunk_type = 9;
  string name = 10;
  repeated float embedding = 11;
}

// ProjectMetadata represents project metadata
message ProjectMetadata {
  string project_key = 1;
  string name = 2;
  string root_path = 3;
  repeated FileDescription files = 4;
}

// FileDescription represents file metadata with AI-generated description
message FileDescription {
  string file_path = 1;
  string description = 2;
  string language = 3;
  int64 size_bytes = 4;
}

// Error represents an error response
message Error {
  string code = 1;
  string message = 2;
  map<string, string> metadata = 3;
}

// Status represents operation status
enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_SUCCESS = 1;
  STATUS_IN_PROGRESS = 2;
  STATUS_FAILED = 3;
  STATUS_CANCELLED = 4;
}
