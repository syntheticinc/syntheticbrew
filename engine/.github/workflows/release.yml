name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  update-change-date:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update BSL Change Date (4 years from release)
        run: |
          RELEASE_DATE=$(date +%Y-%m-%d)
          CHANGE_DATE=$(date -d "$RELEASE_DATE + 4 years" +%Y-%m-%d)
          sed -i "s/^Change Date:.*/Change Date:          $CHANGE_DATE/" LICENSE
          echo "Release: $RELEASE_DATE → Change Date: $CHANGE_DATE"

      - name: Commit updated Change Date
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update BSL Change Date for ${{ github.ref_name }}"
          file_pattern: LICENSE

  release:
    runs-on: ubuntu-latest
    needs: update-change-date
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -o bin/syntheticbrew-engine-linux-amd64   ./cmd/ce
          GOOS=linux   GOARCH=arm64 go build -o bin/syntheticbrew-engine-linux-arm64   ./cmd/ce
          GOOS=darwin  GOARCH=amd64 go build -o bin/syntheticbrew-engine-darwin-amd64  ./cmd/ce
          GOOS=darwin  GOARCH=arm64 go build -o bin/syntheticbrew-engine-darwin-arm64  ./cmd/ce
          GOOS=windows GOARCH=amd64 go build -o bin/syntheticbrew-engine-windows-amd64.exe ./cmd/ce

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          generate_release_notes: true
