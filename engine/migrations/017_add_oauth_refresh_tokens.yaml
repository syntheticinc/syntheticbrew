databaseChangeLog:
  - changeSet:
      id: 017-oauth-refresh-tokens
      author: engine
      comment: |
        oauth_refresh_tokens: persisted OAuth 2.1 refresh tokens for the MCP
        client flow. Only the SHA-256 token_hash is stored, never the raw token.
        family_id groups a rotation chain (reuse of a revoked token revokes the
        whole family); the unique code_jti ties a family to the authorization
        code it was issued from, making authorization-code replay detectable.
      changes:
        - sql:
            sql: |
              CREATE TABLE oauth_refresh_tokens (
                id uuid NOT NULL DEFAULT gen_random_uuid(),
                tenant_id uuid NOT NULL DEFAULT '00000000-0000-0000-0000-000000000001',
                user_sub varchar(255) NOT NULL,
                cid_hash varchar(64) NOT NULL,
                scope varchar(255) NOT NULL,
                resource varchar(512) NOT NULL,
                family_id uuid NOT NULL,
                token_hash varchar(64) NOT NULL,
                code_jti varchar(64),
                created_at timestamptz NOT NULL DEFAULT now(),
                expires_at timestamptz NOT NULL,
                revoked_at timestamptz,
                CONSTRAINT pk_oauth_refresh_tokens PRIMARY KEY (id),
                CONSTRAINT uq_oauth_refresh_tokens_token_hash UNIQUE (token_hash),
                CONSTRAINT uq_oauth_refresh_tokens_code_jti UNIQUE (code_jti)
              );
              CREATE INDEX idx_oauth_refresh_tokens_family ON oauth_refresh_tokens (family_id);
              CREATE INDEX idx_oauth_refresh_tokens_tenant ON oauth_refresh_tokens (tenant_id);
              CREATE INDEX idx_oauth_refresh_tokens_expires ON oauth_refresh_tokens (expires_at);
        - rollback:
            sql: |
              DROP TABLE IF EXISTS oauth_refresh_tokens;
