# Uses softprops/action-gh-release pinned to v2. Consider pinning to commit
# SHA for supply-chain security: https://github.com/softprops/action-gh-release/releases
name: Release Helm Chart

on:
  push:
    tags:
      - 'helm/v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint chart
        run: helm lint engine/deploy/helm/syntheticbrew

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#helm/v}" >> "$GITHUB_OUTPUT"

      - name: Validate semver
        run: |
          if [[ ! "${{ steps.version.outputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?$ ]]; then
            echo "::error::Invalid version format: ${{ steps.version.outputs.version }}. Expected: X.Y.Z or X.Y.Z-prerelease"
            exit 1
          fi

      - name: Check chart version not already published
        run: |
          if helm pull oci://ghcr.io/syntheticinc/charts/syntheticbrew-engine --version ${{ steps.version.outputs.version }} 2>/dev/null; then
            echo "::error::Chart version ${{ steps.version.outputs.version }} already published. Bump version in Chart.yaml and create a new tag."
            exit 1
          fi

      - name: Package chart
        run: |
          # `--version` comes from the git tag (helm/vX.Y.Z) — chart version is
          # release-time decision. `appVersion` is the engine version the chart
          # targets and lives in Chart.yaml; it must NOT be overridden from the
          # tag (chart-only releases keep the same appVersion across bumps).
          # Earlier versions of this workflow passed `--app-version=${version}`
          # too, which forced both equal and shipped wrong appVersion metadata
          # in every chart since 0.6.x (cosmetic — operators always override
          # image.tag — but misleading in `helm show chart`).
          helm package engine/deploy/helm/syntheticbrew \
            -d dist/ \
            --version ${{ steps.version.outputs.version }}

      - name: Verify chart was packaged with Chart.yaml appVersion
        run: |
          # Guard against future re-introduction of the override bug.
          expected_app=$(grep '^appVersion:' engine/deploy/helm/syntheticbrew/Chart.yaml \
            | awk '{print $2}' | tr -d '"')
          actual_app=$(tar -xzf dist/syntheticbrew-engine-${{ steps.version.outputs.version }}.tgz \
            -O syntheticbrew-engine/Chart.yaml | grep '^appVersion:' | awk '{print $2}' | tr -d '"')
          if [[ "$expected_app" != "$actual_app" ]]; then
            echo "::error::Packaged appVersion ($actual_app) does not match Chart.yaml ($expected_app)"
            exit 1
          fi
          echo "appVersion=$actual_app matches Chart.yaml"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to OCI registry
        run: |
          for chart in dist/*.tgz; do
            helm push "$chart" oci://ghcr.io/syntheticinc/charts
          done

      - name: Upload as GitHub Release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
          tag_name: ${{ github.ref_name }}
          name: Helm Chart ${{ github.ref_name }}
          body: |
            Helm chart `syntheticbrew-engine` ${{ steps.version.outputs.version }}.

            **Install:**
            ```
            helm install syntheticbrew oci://ghcr.io/syntheticinc/charts/syntheticbrew-engine --version ${{ steps.version.outputs.version }}
            ```

            See [chart README](https://github.com/syntheticinc/syntheticbrew/tree/main/engine/deploy/helm/syntheticbrew) for configuration.
