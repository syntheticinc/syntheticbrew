name: chart-test

on:
  pull_request:
    paths:
      - 'engine/deploy/helm/syntheticbrew/**'
      - '.github/workflows/chart-test.yml'
  push:
    branches: [main]
    paths:
      - 'engine/deploy/helm/syntheticbrew/**'
      - '.github/workflows/chart-test.yml'

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: helm lint
        run: helm lint engine/deploy/helm/syntheticbrew

      - name: Render — default scenario
        run: |
          helm template smoke engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/default.yaml > /tmp/r-default.yaml
          test -s /tmp/r-default.yaml

      - name: Render — single-shot (regression-pinned for known v0.4.2 bugs)
        run: |
          set -euo pipefail
          R=/tmp/r-single-shot.yaml
          helm template smoke engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/single-shot.yaml > "$R"
          # SA hook annotations
          grep -q '"helm.sh/hook": pre-install,pre-upgrade' "$R"
          grep -q '"helm.sh/hook-weight": "-10"' "$R"
          # Engine HOME=/tmp env
          grep -A1 '            - name: HOME' "$R" | grep -q 'value: "/tmp"'
          # Migrations Job invokes liquibase entrypoint
          grep -q '/liquibase/docker-entrypoint.sh' "$R"
          # configApply Job uses args (not command) — entrypoint /brewctl preserved
          awk '/name: brewctl-apply/{flag=1} flag && /args:/{print "OK"; exit} flag && /command:/{print "FAIL"; exit 1}' "$R" | grep -q OK
          # Bootstrap admin token + configApply hook
          grep -q 'SYNTHETICBREW_BOOTSTRAP_ADMIN_TOKEN' "$R"
          grep -q 'config-apply' "$R"

      - name: Render — restricted-security (auto /tmp emptyDir on readOnlyRootFS)
        run: |
          set -euo pipefail
          R=/tmp/r-restricted.yaml
          helm template smoke engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/restricted-security.yaml > "$R"
          # readOnlyRootFilesystem applied to deployment + 2 jobs
          test "$(grep -c 'readOnlyRootFilesystem: true' "$R")" -ge 3
          # NetworkPolicy rendered
          grep -q 'kind: NetworkPolicy' "$R"
          # /tmp emptyDir auto-mounted
          grep -q 'name: tmp' "$R"
          grep -q 'emptyDir: {}' "$R"

      - name: Render — IRSA (annotation correctness)
        run: |
          set -euo pipefail
          R=/tmp/r-irsa.yaml
          helm template smoke engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/irsa.yaml > "$R"
          # Helm's toYaml normalizes string quoting based on content — match
          # both `value` and `"value"` forms.
          grep -qE 'eks\.amazonaws\.com/role-arn: "?arn:aws:iam::123456789012:role/syntheticbrew-engine-test"?' "$R"

      - name: Render — HTTPRoute (Gateway API)
        run: |
          set -euo pipefail
          R=/tmp/r-httproute.yaml
          helm template smoke engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/httproute.yaml > "$R"
          grep -q 'kind: HTTPRoute' "$R"
          grep -q 'apiVersion: gateway.networking.k8s.io/v1' "$R"

      - name: Render — knowledgeLoader (declarative KB ingest)
        run: |
          set -euo pipefail
          R=/tmp/r-knowledge.yaml
          helm template smoke engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/knowledge.yaml > "$R"
          # Loader Job present + correct hook weight (15, after configApply 10).
          grep -q 'app.kubernetes.io/component: knowledge-loader' "$R"
          grep -q '"helm.sh/hook-weight": "15"' "$R"
          # ConfigMap volume mount for .md files
          grep -q 'mountPath: /etc/syntheticbrew/knowledge-files' "$R"
          # Required values guards: must fail fast when kb / configmap missing
          if helm template smoke engine/deploy/helm/syntheticbrew \
              -f engine/deploy/helm/syntheticbrew/tests/values/knowledge.yaml \
              --set knowledgeLoader.kb='' >/dev/null 2>/tmp/err-kb.txt; then
            echo "FAIL: should have rejected empty knowledgeLoader.kb"; exit 1
          fi
          grep -q 'requires knowledgeLoader.kb' /tmp/err-kb.txt
          if helm template smoke engine/deploy/helm/syntheticbrew \
              -f engine/deploy/helm/syntheticbrew/tests/values/knowledge.yaml \
              --set knowledgeLoader.existingConfigMap='' >/dev/null 2>/tmp/err-cm.txt; then
            echo "FAIL: should have rejected empty knowledgeLoader.existingConfigMap"; exit 1
          fi
          grep -q 'requires knowledgeLoader.existingConfigMap' /tmp/err-cm.txt
          echo "OK: knowledgeLoader render + value guards"

      - name: Render — node-churn (no RWO PVC on critical path)
        run: |
          set -euo pipefail
          R=/tmp/r-node-churn.yaml
          helm template smoke engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/node-churn.yaml > "$R"
          # existingKeysSecret → keys volume is a Secret, not a PVC.
          grep -q 'secretName: "jwt-keys-secret"' "$R"
          # No keys PVC when the keypair comes from a Secret.
          if grep -E '^  name: smoke-syntheticbrew-engine-keys$' "$R"; then
            echo "FAIL: keys PVC rendered despite existingKeysSecret"; exit 1
          fi
          # Engine is always stateless for knowledge → no knowledge PVC.
          if grep -E '^  name: smoke-syntheticbrew-engine-knowledge$' "$R"; then
            echo "FAIL: knowledge PVC rendered"; exit 1
          fi
          # safe-to-evict annotation present (default false).
          grep -q 'cluster-autoscaler.kubernetes.io/safe-to-evict: "false"' "$R"
          # No RWO PVC mounted → RollingUpdate (near-zero redeploy downtime).
          grep -A1 '^  strategy:' "$R" | grep -q 'type: RollingUpdate'
          echo "OK: node-churn render (Secret keypair, no PVC, RollingUpdate)"

      - name: Render — default still uses keys PVC + Recreate (node-churn regression guard)
        run: |
          set -euo pipefail
          R=/tmp/r-default-strategy.yaml
          helm template smoke engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/default.yaml > "$R"
          # Default uses persistence.keys PVC → keys PVC present and Recreate.
          grep -qE '^  name: smoke-syntheticbrew-engine-keys$' "$R"
          grep -A1 '^  strategy:' "$R" | grep -q 'type: Recreate'
          echo "OK: default keeps keys PVC + Recreate"

      - name: Render — BYOK declarative enablement (config.byok → env)
        run: |
          set -euo pipefail
          R=/tmp/r-byok.yaml
          helm template smoke engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/default.yaml \
            --set config.byok.enabled=true \
            --set 'config.byok.allowedProviders={openai,anthropic,openrouter,openai_compatible,ollama}' > "$R"
          grep -q 'name: SYNTHETICBREW_BYOK_ENABLED' "$R"
          grep -A1 'name: SYNTHETICBREW_BYOK_ENABLED' "$R" | grep -q 'value: "true"'
          grep -A1 'name: SYNTHETICBREW_BYOK_ALLOWED_PROVIDERS' "$R" | grep -q 'openai,anthropic,openrouter,openai_compatible,ollama'
          # Gated: no BYOK env when config.byok is absent (existing releases unaffected).
          helm template smoke engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/default.yaml > /tmp/r-byok-off.yaml
          if grep -q 'SYNTHETICBREW_BYOK_ENABLED' /tmp/r-byok-off.yaml; then
            echo "FAIL: BYOK env rendered without config.byok"; exit 1
          fi
          echo "OK: BYOK env gated on config.byok"

      - name: Render — chart-managed DB Secret is a pre-install hook (migrations race guard)
        run: |
          set -euo pipefail
          # A chart-managed DB Secret (no existingSecret) must be a pre-install/
          # pre-upgrade hook at a weight below the migrations Job (5), or the
          # migrations hook starts before the Secret exists and a fresh install
          # hangs on CreateContainerConfigError. See CHANGELOG 0.14.0 Fixed. The
          # hook is unconditional (like the ServiceAccount) — gating it on
          # migrations.enabled would flip Helm ownership across upgrades and Helm
          # would delete the Secret. Assert the hook holds with migrations both on
          # and off.
          for MIG in true false; do
            R=/tmp/r-managed-secret-$MIG.yaml
            helm template smoke engine/deploy/helm/syntheticbrew \
              --set image.tag=1.0.0 \
              --set postgresql.external.host=pg \
              --set postgresql.external.password=pw \
              --set migrations.enabled=$MIG \
              --show-only templates/secret.yaml > "$R"
            grep -q '"helm.sh/hook": pre-install,pre-upgrade' "$R"
            grep -q '"helm.sh/hook-weight": "-5"' "$R"
          done
          echo "OK: chart-managed Secret is an unconditional pre-install hook"

      - name: replicaCount=local guard
        run: |
          set -euo pipefail
          # Must fail at template time when replicaCount > 1 with auth.mode=local.
          if helm template smoke engine/deploy/helm/syntheticbrew \
              -f engine/deploy/helm/syntheticbrew/tests/values/single-shot.yaml \
              --set replicaCount=3 > /tmp/r-multi.yaml 2>/tmp/err-multi.txt; then
            echo "FAIL: chart should have rejected replicaCount=3 with auth.mode=local"
            exit 1
          fi
          grep -q 'auth.mode=local supports only replicaCount=1' /tmp/err-multi.txt
          echo "OK: replicaCount guard fired with expected message"

      - name: HPA guard with auth.mode=local
        run: |
          set -euo pipefail
          # Must fail at template time when autoscaling.maxReplicas>1 with auth.mode=local.
          # Catches regression of MAJOR-1 — HPA was previously bypassing the multi-replica check.
          if helm template smoke engine/deploy/helm/syntheticbrew \
              -f engine/deploy/helm/syntheticbrew/tests/values/single-shot.yaml \
              --set autoscaling.enabled=true \
              --set autoscaling.maxReplicas=5 > /tmp/r-hpa.yaml 2>/tmp/err-hpa.txt; then
            echo "FAIL: chart should have rejected HPA with auth.mode=local + maxReplicas>1"
            exit 1
          fi
          grep -q 'autoscaling.enabled and maxReplicas>1 is unsafe' /tmp/err-hpa.txt
          echo "OK: HPA guard fired with expected message"

      - name: Verify .helmignore keeps tests/ + scratch + dotfiles out of OCI artefact
        run: |
          set -euo pipefail
          mkdir -p /tmp/helmpkg
          rm -f /tmp/helmpkg/syntheticbrew-engine-*.tgz
          PKG=$(helm package engine/deploy/helm/syntheticbrew --destination /tmp/helmpkg | awk '{print $NF}')
          test -n "$PKG"
          # Forbid: tests/, _scratch/, .git/, editor backups, OWNERS.
          # Do NOT forbid `.helmignore` (helm packages it by design) or
          # `examples/` (intentional chart contents — argocd Application sample).
          LEAKED=$(tar -tzf "$PKG" | grep -E '(^|/)(\.git|tests|_scratch)/|\.(bak|swp|orig|tmp|sw[a-p])$|/OWNERS$' || true)
          if [ -n "$LEAKED" ]; then
            echo "FAIL: leaked into chart package:"
            echo "$LEAKED"
            exit 1
          fi
          echo "OK: package clean"

  integration:
    runs-on: ubuntu-latest
    needs: static
    strategy:
      fail-fast: false
      matrix:
        k8s: [v1.28.0, v1.30.0, v1.31.0]
    steps:
      - uses: actions/checkout@v7

      - uses: helm/kind-action@v1
        with:
          node_image: kindest/node:${{ matrix.k8s }}
          # Run ID + attempt avoids cluster-name collision when two CI runs hit
          # the same self-hosted runner concurrently or a previous run leaked.
          cluster_name: chart-test-${{ matrix.k8s }}-${{ github.run_id }}-${{ github.run_attempt }}

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Apply postgres-pgvector fixture
        run: |
          kubectl apply -f engine/deploy/helm/syntheticbrew/tests/fixtures/postgres-pgvector.yaml
          # rollout status waits for the StatefulSet controller to create the
          # pod AND for the pod to become ready. Plain `kubectl wait --for=ready`
          # races: apply returns before the pod object exists, kubectl wait
          # then fails immediately with "no matching resources found".
          kubectl rollout status statefulset/postgres-pgvector --timeout=300s
          kubectl wait --for=condition=ready pod \
            -l app=postgres-pgvector --timeout=300s

      - name: helm install — single-shot
        run: |
          helm install bb engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/single-shot.yaml \
            --wait --timeout 15m

      - name: Verify migrations Job actually ran Liquibase
        run: |
          set -euo pipefail
          kubectl logs job/bb-syntheticbrew-engine-migrations \
            | grep -E 'Update has been successful|UPDATE SUMMARY|Liquibase command .update. was executed successfully'
          kubectl exec postgres-pgvector-0 -- \
            psql -U postgres -d syntheticbrew -tAc "SELECT count(*) FROM databasechangelog" \
            | awk '{ if ($1+0 < 1) { print "FAIL: databasechangelog empty"; exit 1 } else { print "OK: " $1 " changesets applied" } }'

      - name: Smoke — install
        run: |
          set -euo pipefail
          kubectl port-forward svc/bb-syntheticbrew-engine 18443:8443 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT
          # Wait for engine pod ready (not just deployment apply). Engine
          # serves 503 on /health for a few seconds while it loads agents.
          kubectl wait --for=condition=available deploy/bb-syntheticbrew-engine --timeout=300s
          for i in $(seq 1 30); do
            curl -sf http://localhost:18443/api/v1/health >/dev/null && break
            sleep 2
          done
          ADMIN_TOKEN=$(kubectl get secret postgres-credentials \
            -o jsonpath='{.data.token}' | base64 -d) \
            ENGINE_URL=http://localhost:18443 \
            EXPECT_BREWCTL_RESOURCES=true \
            bash engine/deploy/helm/syntheticbrew/tests/scripts/smoke.sh

      # Catches: SA hook re-creation race, migrations idempotency, engine PVC
      # persistence (JWT keypair), configApply re-runs as "No changes."
      - name: helm upgrade — same chart, --reuse-values
        run: |
          helm upgrade bb engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/single-shot.yaml \
            --reuse-values --wait --timeout 10m

      - name: Smoke — upgrade
        run: |
          set -euo pipefail
          kubectl port-forward svc/bb-syntheticbrew-engine 18443:8443 >/tmp/pf2.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT
          # Wait for engine pod ready (not just deployment apply). Engine
          # serves 503 on /health for a few seconds while it loads agents.
          kubectl wait --for=condition=available deploy/bb-syntheticbrew-engine --timeout=300s
          for i in $(seq 1 30); do
            curl -sf http://localhost:18443/api/v1/health >/dev/null && break
            sleep 2
          done
          ADMIN_TOKEN=$(kubectl get secret postgres-credentials \
            -o jsonpath='{.data.token}' | base64 -d) \
            ENGINE_URL=http://localhost:18443 \
            EXPECT_BREWCTL_RESOURCES=true \
            bash engine/deploy/helm/syntheticbrew/tests/scripts/smoke.sh
          # configApply on upgrade must be no-op
          kubectl logs -l app.kubernetes.io/component=config-apply --tail=20 \
            | grep -q 'No changes\|Apply complete'

      - name: helm rollback — release 1
        run: |
          helm rollback bb 1 --wait --timeout 10m

      - name: Smoke — rollback
        run: |
          set -euo pipefail
          kubectl port-forward svc/bb-syntheticbrew-engine 18443:8443 >/tmp/pf3.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT
          # Wait for engine pod ready (not just deployment apply). Engine
          # serves 503 on /health for a few seconds while it loads agents.
          kubectl wait --for=condition=available deploy/bb-syntheticbrew-engine --timeout=300s
          for i in $(seq 1 30); do
            curl -sf http://localhost:18443/api/v1/health >/dev/null && break
            sleep 2
          done
          ADMIN_TOKEN=$(kubectl get secret postgres-credentials \
            -o jsonpath='{.data.token}' | base64 -d) \
            ENGINE_URL=http://localhost:18443 \
            EXPECT_BREWCTL_RESOURCES=true \
            bash engine/deploy/helm/syntheticbrew/tests/scripts/smoke.sh

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pod -l app.kubernetes.io/instance=bb || true
          kubectl logs -l app.kubernetes.io/instance=bb --all-containers --tail=200 || true
          kubectl logs job/bb-syntheticbrew-engine-migrations --tail=200 || true
          kubectl logs job/bb-syntheticbrew-engine-config-apply --tail=200 || true
          kubectl logs postgres-pgvector-0 --tail=100 || true

  # Separate job: install restricted-security scenario on a single k8s version.
  # Validates that auto /tmp emptyDir wiring lets engine boot under
  # readOnlyRootFilesystem: true (chart-test would silently miss the
  # CrashLoopBackOff if this scenario stayed render-only).
  integration-restricted:
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v7

      - uses: helm/kind-action@v1
        with:
          node_image: kindest/node:v1.30.0
          cluster_name: chart-test-restricted-${{ github.run_id }}-${{ github.run_attempt }}

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Apply postgres-pgvector fixture
        run: |
          kubectl apply -f engine/deploy/helm/syntheticbrew/tests/fixtures/postgres-pgvector.yaml
          # rollout status waits for the StatefulSet controller to create the
          # pod AND for the pod to become ready. Plain `kubectl wait --for=ready`
          # races: apply returns before the pod object exists, kubectl wait
          # then fails immediately with "no matching resources found".
          kubectl rollout status statefulset/postgres-pgvector --timeout=300s
          kubectl wait --for=condition=ready pod \
            -l app=postgres-pgvector --timeout=300s

      - name: helm install — restricted-security (readOnlyRootFilesystem=true)
        run: |
          helm install bb engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/restricted-security.yaml \
            --wait --timeout 15m

      - name: Verify engine + jobs ran with read-only root
        run: |
          set -euo pipefail
          # Confirm spec actually carries readOnlyRootFilesystem=true.
          POD=$(kubectl get pod -l app.kubernetes.io/name=syntheticbrew-engine -o name | head -1)
          test "$(kubectl get $POD -o jsonpath='{.spec.containers[0].securityContext.readOnlyRootFilesystem}')" = "true"
          # /tmp must be mounted (auto emptyDir).
          kubectl get $POD -o jsonpath='{.spec.containers[0].volumeMounts[*].mountPath}' | grep -q '/tmp'
          # Migrations succeeded, changelog populated.
          kubectl exec postgres-pgvector-0 -- \
            psql -U postgres -d syntheticbrew -tAc "SELECT count(*) FROM databasechangelog" \
            | awk '{ if ($1+0 < 1) { print "FAIL"; exit 1 } else { print "OK: " $1 } }'

      - name: Smoke
        run: |
          set -euo pipefail
          kubectl port-forward svc/bb-syntheticbrew-engine 18443:8443 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT
          kubectl wait --for=condition=available deploy/bb-syntheticbrew-engine --timeout=300s
          for i in $(seq 1 30); do
            curl -sf http://localhost:18443/api/v1/health >/dev/null && break
            sleep 2
          done
          # restricted-security: configApply.config is intentionally `models: []`
          # — scenario tests engine boot under readOnlyRootFilesystem, not the
          # brewctl resource-creation path. Do NOT set EXPECT_BREWCTL_RESOURCES.
          ADMIN_TOKEN=$(kubectl get secret postgres-credentials \
            -o jsonpath='{.data.token}' | base64 -d) \
            ENGINE_URL=http://localhost:18443 \
            bash engine/deploy/helm/syntheticbrew/tests/scripts/smoke.sh

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pod -l app.kubernetes.io/instance=bb || true
          kubectl logs -l app.kubernetes.io/instance=bb --all-containers --tail=200 || true
          kubectl logs job/bb-syntheticbrew-engine-migrations --tail=200 || true
          kubectl logs job/bb-syntheticbrew-engine-config-apply --tail=200 || true

  # Separate job: declarative Knowledge / RAG ingest end-to-end.
  # Asserts knowledgeLoader Job uploaded ConfigMap-mounted .md files into the
  # KB declared by configApply bundle. Single k8s version (1.30) — no value
  # in matrix-running this since the loader logic is k8s-version-neutral.
  integration-knowledge:
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v7

      - uses: helm/kind-action@v1
        with:
          node_image: kindest/node:v1.30.0
          cluster_name: chart-test-knowledge-${{ github.run_id }}-${{ github.run_attempt }}

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      # Build the engine + migrations images from THIS commit and load them into
      # kind. The knowledgeLoader uploads files into a KB, which under the
      # stateless model needs the engine from this PR — a published image would
      # be a different (stateful) engine version. Building from source decouples
      # the chart test from the publish cycle (no post-publish fixture pin).
      - name: Build engine + migrations images from source
        run: |
          docker build -t local/syntheticbrew-engine:ci -f engine/Dockerfile engine
          docker build -t local/syntheticbrew-migrations:ci -f engine/Dockerfile.migrations engine
          kind load docker-image local/syntheticbrew-engine:ci local/syntheticbrew-migrations:ci \
            --name chart-test-knowledge-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Apply postgres-pgvector + knowledge-files fixtures
        run: |
          kubectl apply -f engine/deploy/helm/syntheticbrew/tests/fixtures/postgres-pgvector.yaml
          kubectl apply -f engine/deploy/helm/syntheticbrew/tests/fixtures/knowledge-files.yaml
          kubectl rollout status statefulset/postgres-pgvector --timeout=300s
          kubectl wait --for=condition=ready pod \
            -l app=postgres-pgvector --timeout=300s

      - name: helm install — knowledge scenario
        run: |
          helm install bb engine/deploy/helm/syntheticbrew \
            -f engine/deploy/helm/syntheticbrew/tests/values/knowledge.yaml \
            --set image.repository=local/syntheticbrew-engine --set image.tag=ci --set image.pullPolicy=Never \
            --set migrations.image.repository=local/syntheticbrew-migrations --set migrations.image.tag=ci --set migrations.image.pullPolicy=Never \
            --wait --timeout 15m

      # NOTE: no explicit `Verify knowledgeLoader Job ran` step. The Job
      # uses hook-delete-policy=before-hook-creation,hook-succeeded — Helm
      # reaps successful Jobs immediately, so `kubectl get job/...` 404s
      # by the time CI runs. `helm install --wait` already gates on hook
      # success (would fail if the Job didn't complete), and the Smoke
      # step below asserts end-state via EXPECT_KB_FILE_COUNT. The
      # Diagnostics-on-failure step at the bottom captures Job logs if
      # the Job FAILED (failed Jobs persist by design under this policy).

      - name: Smoke
        run: |
          set -euo pipefail
          kubectl port-forward svc/bb-syntheticbrew-engine 18443:8443 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT
          kubectl wait --for=condition=available deploy/bb-syntheticbrew-engine --timeout=300s
          for i in $(seq 1 30); do
            curl -sf http://localhost:18443/api/v1/health >/dev/null && break
            sleep 2
          done
          ADMIN_TOKEN=$(kubectl get secret postgres-credentials \
            -o jsonpath='{.data.token}' | base64 -d) \
            ENGINE_URL=http://localhost:18443 \
            EXPECT_BREWCTL_RESOURCES=true \
            EXPECT_KB_FILES=true \
            KB_NAME=kind-smoke-kb \
            EXPECT_KB_FILE_COUNT=2 \
            bash engine/deploy/helm/syntheticbrew/tests/scripts/smoke.sh

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pod -l app.kubernetes.io/instance=bb || true
          kubectl logs -l app.kubernetes.io/instance=bb --all-containers --tail=200 || true
          kubectl logs job/bb-syntheticbrew-engine-migrations --tail=200 || true
          kubectl logs job/bb-syntheticbrew-engine-config-apply --tail=200 || true
          kubectl logs job/bb-syntheticbrew-engine-knowledge-loader --tail=200 || true

  # Separate job: install via the documented Quick Install (chart-managed DB
  # password, NOT existingSecret) with OAuth enabled. Every other integration
  # scenario points at a pre-existing DATABASE_URL Secret, so the chart-managed
  # Secret + pre-install migrations-hook ordering (CHANGELOG 0.14.0 Fixed) is
  # never exercised there — a fresh Quick Install used to hang and CI stayed
  # green. This job reproduces that path end-to-end and asserts the OAuth 2.1
  # sign-in surface + MCP endpoint a CE self-host on k8s actually gets.
  integration-managed-secret:
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v7

      - uses: helm/kind-action@v1
        with:
          node_image: kindest/node:v1.30.0
          cluster_name: chart-test-managed-${{ github.run_id }}-${{ github.run_attempt }}

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Build engine + migrations images from source
        run: |
          docker build -t local/syntheticbrew-engine:ci -f engine/Dockerfile engine
          docker build -t local/syntheticbrew-migrations:ci -f engine/Dockerfile.migrations engine
          kind load docker-image local/syntheticbrew-engine:ci local/syntheticbrew-migrations:ci \
            --name chart-test-managed-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Apply postgres-pgvector fixture
        run: |
          kubectl apply -f engine/deploy/helm/syntheticbrew/tests/fixtures/postgres-pgvector.yaml
          kubectl rollout status statefulset/postgres-pgvector --timeout=300s
          kubectl wait --for=condition=ready pod -l app=postgres-pgvector --timeout=300s

      - name: helm install — chart-managed DB password + OAuth (fresh install must not hang)
        run: |
          # No existingSecret: the chart renders and manages the DATABASE_URL
          # Secret itself. Credentials match the postgres-pgvector fixture. A
          # bounded --timeout turns the pre-fix hang into a hard CI failure.
          # bootstrapAdminToken reuses the fixture's known bb_ token so the MCP
          # assertion below can call the endpoint.
          helm install bb engine/deploy/helm/syntheticbrew \
            --set image.repository=local/syntheticbrew-engine --set image.tag=ci --set image.pullPolicy=Never \
            --set migrations.image.repository=local/syntheticbrew-migrations --set migrations.image.tag=ci --set migrations.image.pullPolicy=Never \
            --set postgresql.external.host=postgres-pgvector \
            --set postgresql.external.username=syntheticbrew \
            --set postgresql.external.password=kind-test-password \
            --set postgresql.external.database=syntheticbrew \
            --set config.oauth.issuer=http://app.local.test \
            --set bootstrapAdminToken.enabled=true \
            --set bootstrapAdminToken.existingSecret=postgres-credentials \
            --wait --timeout 15m

      - name: Verify migrations ran + chart-managed Secret is a hook
        run: |
          set -euo pipefail
          kubectl exec postgres-pgvector-0 -- \
            psql -U postgres -d syntheticbrew -tAc "SELECT count(*) FROM databasechangelog" \
            | awk '{ if ($1+0 < 1) { print "FAIL: databasechangelog empty"; exit 1 } else { print "OK: " $1 " changesets applied" } }'
          H=$(kubectl get secret bb-syntheticbrew-engine-secrets -o jsonpath='{.metadata.annotations.helm\.sh/hook}')
          test "$H" = "pre-install,pre-upgrade" || { echo "FAIL: chart-managed Secret is not a hook ($H)"; exit 1; }
          echo "OK: chart-managed Secret carries pre-install hook"

      - name: Smoke — health + OAuth discovery + MCP endpoint
        run: |
          set -euo pipefail
          kubectl port-forward svc/bb-syntheticbrew-engine 18443:8443 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT
          kubectl wait --for=condition=available deploy/bb-syntheticbrew-engine --timeout=300s
          for i in $(seq 1 30); do
            curl -sf http://localhost:18443/api/v1/health >/dev/null && break
            sleep 2
          done
          # OAuth 2.1 AS discovery (RFC 8414) reflects the configured issuer.
          curl -sf http://localhost:18443/.well-known/oauth-authorization-server \
            | grep -q '"issuer":"http://app.local.test"'
          # Protected-resource metadata (RFC 9728) advertises the MCP endpoint.
          curl -sf http://localhost:18443/.well-known/oauth-protected-resource \
            | grep -q '"resource":"http://app.local.test/api/v1/mcp/rpc"'
          # Unauthenticated MCP call is challenged (401 + WWW-Authenticate).
          CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST http://localhost:18443/api/v1/mcp/rpc -d '{}')
          test "$CODE" = "401" || { echo "FAIL: MCP unauth expected 401, got $CODE"; exit 1; }
          # bb_ admin token → MCP tools/list returns tools.
          TOKEN=$(kubectl get secret postgres-credentials -o jsonpath='{.data.token}' | base64 -d)
          curl -sf -X POST http://localhost:18443/api/v1/mcp/rpc \
            -H "authorization: Bearer $TOKEN" -H 'content-type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' \
            | grep -q '"tools":\[' || { echo "FAIL: MCP tools/list returned no tools"; exit 1; }
          echo "OK: health + OAuth discovery + MCP challenge + MCP tools/list"

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pod -l app.kubernetes.io/instance=bb || true
          kubectl logs -l app.kubernetes.io/instance=bb --all-containers --tail=200 || true
          kubectl logs job/bb-syntheticbrew-engine-migrations --tail=200 || true
